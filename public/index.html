<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- =====================================================================
         Content Security Policy (CSP)
         ----------------------------------------------------------------------
         Limite les sources autorisées pour scripts/styles/images/connexions.
         Réduit la surface d'attaque en cas de XSS.
         ===================================================================== -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.google.com https://www.gstatic.com https://cdn.jsdelivr.net https://cdn.emailjs.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://cdn.jsdelivr.net https://via.placeholder.com; media-src 'self' blob:; connect-src 'self' https://api.emailjs.com https://www.google.com; frame-src https://www.google.com; object-src 'none'; base-uri 'self'; form-action 'self';">

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Portfolio de Mathieu Raudin — Développeur Web"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- =====================================================================
         Polices : Fraunces (titres), Manrope (corps),
         JetBrains Mono (kickers/labels), Caveat (manuscrit)
         preconnect ouvre la connexion à l'avance pour gagner ~100ms
         ===================================================================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;600&display=swap">

    <!-- Note : on a retiré les preload d'images (face.jpg, nouveau-paysage.svg,
         tout-sol.svg) car elles ne sont utilisées que sur les pages About et
         Contact, ce qui générait des warnings "preloaded but not used" sur
         la HomePage. Le code splitting (lazy() dans App.js) charge ces pages
         à la demande, et leurs images se chargent en parallèle du chunk JS,
         donc l'impact perçu est négligeable. -->

    <title>Mathieu Raudin — Portfolio</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
