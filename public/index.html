<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- =====================================================================
         Content Security Policy (CSP)
         ----------------------------------------------------------------------
         Limite les sources autorisées pour scripts/styles/images/connexions.

         Domaines autorisés :
         - 'self'                              : Mon propre domaine
         - https://www.google.com              : reCAPTCHA (script + iframe)
         - https://www.gstatic.com             : reCAPTCHA (script statique)
         - https://cdn.jsdelivr.net            : icônes devicons (skills About)
         - https://fonts.googleapis.com        : feuille de style Google Fonts
         - https://fonts.gstatic.com           : fichiers de polices Google Fonts
         - https://api.emailjs.com             : envoi du formulaire de contact
         - data: / blob:                       : images SVG/data URIs et videos
         ===================================================================== -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.google.com https://www.gstatic.com https://cdn.jsdelivr.net https://cdn.emailjs.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://cdn.jsdelivr.net https://via.placeholder.com; media-src 'self' blob:; connect-src 'self' https://api.emailjs.com https://www.google.com; frame-src https://www.google.com; object-src 'none'; base-uri 'self'; form-action 'self';">

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Polices : Instrument Serif (titres élégants), Geist (texte courant), JetBrains Mono (kickers/labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;600&display=swap">

    <!-- Préchargement des assets utilisés dans plusieurs pages pour accélérer
         la navigation interne (l'asset est en cache avant qu'on en ait besoin) -->
    <link rel="preload" as="image" href="%PUBLIC_URL%/images/tout-sol.svg" type="image/svg+xml">
    <link rel="preload" as="image" href="%PUBLIC_URL%/images/nouveau-paysage.svg" type="image/svg+xml">
    <link rel="preload" as="image" href="%PUBLIC_URL%/images/face.jpg" type="image/jpeg">
    <link rel="preload" as="video" href="%PUBLIC_URL%/paysages_tout.mp4" type="video/mp4">

    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>React App</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
